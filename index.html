<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheckoutChamp Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .landing-wrapper {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .landing-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .landing-subtitle {
      color: #6c757d;
      margin-bottom: 2rem;
    }
  </style>
  <!--
  window.routes = ["/checkoutpage"];

  window.navigations = {
    "checkoutpage": {}
  };
  -->
</head>
<body>
  <div class="container">
    <div class="landing-wrapper">
      <div>
        <div class="landing-title">Welcome to Our Store</div>
        <p class="landing-subtitle">Continue to checkout to complete your purchase.</p>
        <a href="/checkoutpage" action="route" class="btn btn-primary">Go to Checkout</a>
      </div>
    </div>
  </div>
</body>
</html>
